services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fakenews-detector-server
    ports:
      - "8787:8080"
    environment:
      PORT: "8080"
      GEMINI_URL: "https://gemini.google.com/app"
      GEMINI_HEADLESS: "true"
      GEMINI_TIMEOUT_MS: "90000"
      GEMINI_LOGIN_WAIT_MS: "300000"
      GEMINI_CDP_URL: "ws://host.docker.internal:9222/devtools/browser/29202130-9ce3-44c8-8a56-557033cae847"
      GEMINI_REQUIRE_LOGIN: "true"
    volumes:
      - ./server/.gemini-profile:/app/.gemini-profile
    restart: unless-stopped

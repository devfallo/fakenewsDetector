services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: fakenews-detector-server
    ports:
      - "8787:8080"
      - "6080:6080"
    environment:
      PORT: "8080"
      GEMINI_URL: "https://gemini.google.com/app"
      GEMINI_RUN_MODE: "geminiapi"
      GEMINI_TIMEOUT_MS: "90000"
      GEMINI_LOGIN_WAIT_MS: "300000"
      GEMINI_CDP_URL: ""
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_API_MODEL: "gemini-2.5-flash-lite"
      GEMINI_REQUIRE_LOGIN: "true"
      ENABLE_VNC: "true"
      NOVNC_PORT: "6080"
      VNC_PORT: "5900"
      DISPLAY: ":99"
      GEMINI_STEALTH: "true"
    volumes:
      - ./server/.gemini-profile:/app/.gemini-profile
    restart: unless-stopped
